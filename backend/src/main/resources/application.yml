spring:
  application:
    name: test-yourself-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/testyourself
    username: postgres
    password: 12345
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

openai:
  api:
    key: ${OPENAI_API_KEY}
    url: https://api.openai.com/v1/chat/completions
    model: gpt-3.5-turbo
    mock: true

logging:
  level:
    com.testyourself: DEBUG
