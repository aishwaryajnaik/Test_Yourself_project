name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Unit + API + E2E tests (all TypeScript, all in e2e-tests/) ────────────
  ts-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testyourself
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      # Start backend (needed for API + E2E tests)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and start backend
        working-directory: ./backend
        run: mvn spring-boot:run &
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testyourself
          OPENAI_API_MOCK: true

      - name: Wait for backend to be ready
        run: npx wait-on http://localhost:8080/api/tests/home --timeout 60000

      # Start frontend (needed for E2E tests)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Start frontend
        working-directory: ./frontend
        run: npm ci && npm start &

      - name: Wait for frontend to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      # Run all three test layers
      - name: Install test dependencies
        working-directory: ./e2e-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./e2e-tests
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        working-directory: ./e2e-tests
        run: npm run test:unit

      - name: Run API tests
        working-directory: ./e2e-tests
        run: npm run test:api
        env:
          API_URL: http://localhost:8080/api/tests

      - name: Run E2E tests
        working-directory: ./e2e-tests
        run: npm run test:e2e

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: e2e-tests/reports/
